name: Prettier Check

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "transformerlab-docs/**"
      - "package.json"
      - ".github/workflows/prettier.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "transformerlab-docs/**"
      - "package.json"
      - ".github/workflows/prettier.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npm run format:check
